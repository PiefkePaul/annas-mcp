name: docker-publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

      - name: Build CLI binary
        run: go build ./cmd/annas-mcp

      - name: Build hosted HTTP image
        run: docker build --target http-runtime --tag annas-mcp:http-test .

      - name: Build local MCP image
        run: docker build --target mcp-stdio-runtime --tag annas-mcp:mcp-test .

  dockerhub:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker Hub image settings
        id: image
        shell: bash
        env:
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: |
          if [[ -z "$DOCKER_USERNAME" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub publish skipped: repository variable DOCKER_USERNAME is missing." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [[ -z "$DOCKER_PASSWORD" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub publish skipped: repository secret DOCKER_PASSWORD is missing." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          namespace="${DOCKERHUB_NAMESPACE:-$DOCKER_USERNAME}"
          repository="${DOCKERHUB_REPOSITORY:-${GITHUB_REPOSITORY#*/}}"

          namespace="$(echo "$namespace" | tr '[:upper:]' '[:lower:]')"
          repository="$(echo "$repository" | tr '[:upper:]' '[:lower:]')"

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "login_user=$DOCKER_USERNAME" >> "$GITHUB_OUTPUT"
          echo "image=docker.io/$namespace/$repository" >> "$GITHUB_OUTPUT"
          echo "repository=$namespace/$repository" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.image.outputs.enabled == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.image.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.image.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ steps.image.outputs.login_user }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        if: steps.image.outputs.enabled == 'true'
        id: meta-http
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Extract Docker metadata for local MCP image
        if: steps.image.outputs.enabled == 'true'
        id: meta-mcp
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=mcp,enable={{is_default_branch}}
            type=sha,prefix=mcp-sha-
            type=semver,pattern={{version}},prefix=mcp-
            type=semver,pattern={{major}}.{{minor}},prefix=mcp-
            type=semver,pattern={{major}},prefix=mcp-

      - name: Build and push hosted HTTP image
        if: steps.image.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: http-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-http.outputs.tags }}
          labels: ${{ steps.meta-http.outputs.labels }}
          cache-from: type=gha,scope=http-runtime
          cache-to: type=gha,scope=http-runtime,mode=max

      - name: Build and push local MCP image
        if: steps.image.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: mcp-stdio-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha,scope=mcp-stdio-runtime
          cache-to: type=gha,scope=mcp-stdio-runtime,mode=max
