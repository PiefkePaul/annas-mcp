name: docker-publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Docker Hub image settings
        id: image
        shell: bash
        env:
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: |
          if [[ -z "$DOCKER_USERNAME" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub publish skipped: repository variable DOCKER_USERNAME is missing." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [[ -z "$DOCKER_PASSWORD" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub publish skipped: repository secret DOCKER_PASSWORD is missing." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          namespace="${DOCKERHUB_NAMESPACE:-$DOCKER_USERNAME}"
          repository="${DOCKERHUB_REPOSITORY:-${GITHUB_REPOSITORY#*/}}"

          namespace="$(echo "$namespace" | tr '[:upper:]' '[:lower:]')"
          repository="$(echo "$repository" | tr '[:upper:]' '[:lower:]')"

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "login_user=$DOCKER_USERNAME" >> "$GITHUB_OUTPUT"
          echo "image=docker.io/$namespace/$repository" >> "$GITHUB_OUTPUT"
          echo "repository=$namespace/$repository" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.image.outputs.enabled == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.image.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.image.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ steps.image.outputs.login_user }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        if: steps.image.outputs.enabled == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        if: steps.image.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
