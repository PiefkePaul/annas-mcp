services:
  annas-mcp:
    build:
      context: .
      target: http-runtime
    container_name: annas-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ANNAS_SECRET_KEY: ${ANNAS_SECRET_KEY:-}
      ANNAS_BASE_URL: ${ANNAS_BASE_URL:-}
      ANNAS_BASE_URLS: ${ANNAS_BASE_URLS:-}
      ANNAS_MAX_INLINE_DOWNLOAD_MB: ${ANNAS_MAX_INLINE_DOWNLOAD_MB:-20}
      ANNAS_HTTP_ADDR: ${ANNAS_HTTP_ADDR:-:8080}
      ANNAS_HTTP_PATH: ${ANNAS_HTTP_PATH:-/mcp}
      ANNAS_HTTP_AUTH_MODE: ${ANNAS_HTTP_AUTH_MODE:-none}
      ANNAS_PUBLIC_BASE_URL: ${ANNAS_PUBLIC_BASE_URL:-}
      ANNAS_HTTP_BEARER_TOKEN: ${ANNAS_HTTP_BEARER_TOKEN:-}
      ANNAS_AUTH_MASTER_KEY: ${ANNAS_AUTH_MASTER_KEY:-}
      ANNAS_AUTH_STORE_PATH: ${ANNAS_AUTH_STORE_PATH:-/data/auth-store.enc}
      ANNAS_AUTH_ACCESS_TOKEN_TTL: ${ANNAS_AUTH_ACCESS_TOKEN_TTL:-1h}
      ANNAS_AUTH_REFRESH_TOKEN_TTL: ${ANNAS_AUTH_REFRESH_TOKEN_TTL:-720h}
      ANNAS_AUTH_CODE_TTL: ${ANNAS_AUTH_CODE_TTL:-10m}
      ANNAS_AUTH_SESSION_TTL: ${ANNAS_AUTH_SESSION_TTL:-720h}
    ports:
      - "${ANNAS_HTTP_PORT:-8080}:8080"
    volumes:
      - ./authdata:/data
