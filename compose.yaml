services:
  annas-mcp:
    build:
      context: .
    container_name: annas-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ANNAS_DOWNLOAD_PATH: ${ANNAS_DOWNLOAD_PATH:-/data/downloads}
      ANNAS_HTTP_ADDR: ${ANNAS_HTTP_ADDR:-:8080}
      ANNAS_HTTP_PATH: ${ANNAS_HTTP_PATH:-/mcp}
      ANNAS_HTTP_AUTH_MODE: ${ANNAS_HTTP_AUTH_MODE:-none}
      ANNAS_PUBLIC_BASE_URL: ${ANNAS_PUBLIC_BASE_URL:-}
    ports:
      - "${ANNAS_HTTP_PORT:-8080}:8080"
    volumes:
      - ./downloads:/data/downloads
